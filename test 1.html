r<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>$GODOT_PROJECT_NAME</title>

  <!-- Godot requires this exact meta for audio context -->
  <meta name="theme-color" content="#0a0a0f" />

  <!-- ethers.js v6 — wallet + JSON-RPC -->
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.1/dist/ethers.umd.min.js"></script>

  <style>
    /* ── design tokens ─────────────────────────────────────────── */
    :root {
      --bg:          #0a0a0f;
      --surface:     #13131c;
      --border:      #2a2a3d;
      --accent:      #7c6dfa;
      --accent-dim:  #3d3580;
      --success:     #22d48f;
      --warn:        #f0a030;
      --danger:      #e84040;
      --text:        #e8e8f0;
      --text-muted:  #6b6b88;
      --font-ui:     'DM Mono', 'Fira Mono', monospace;
      --canvas-w:    $GODOT_CANVAS_WIDTH;
      --canvas-h:    $GODOT_CANVAS_HEIGHT;
    }

    /* ── reset ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── header bar ────────────────────────────────────────────── */
    #header {
      width: 100%;
      max-width: calc(var(--canvas-w) * 1px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0 8px;
    }

    #game-title {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* ── wallet button ─────────────────────────────────────────── */
    #wallet-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 14px;
      font-family: var(--font-ui);
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    #wallet-btn:hover { border-color: var(--accent); color: var(--text); }
    #wallet-btn.connected { border-color: var(--success); color: var(--success); }
    #wallet-btn.connected .dot { background: var(--success); }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      flex-shrink: 0;
    }

    /* ── canvas wrapper ────────────────────────────────────────── */
    #canvas-wrap {
      position: relative;
      flex: 1;
      min-height: 0;
      aspect-ratio: var(--canvas-w) / var(--canvas-h);
      max-width: 100%;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      background: #000;
    }

    #canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* loading overlay */
    #loading-overlay {
      position: absolute;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 10;
      transition: opacity 0.4s;
    }
    #loading-overlay.hidden { opacity: 0; pointer-events: none; }

    #loading-label {
      font-size: 11px;
      letter-spacing: 0.12em;
      color: var(--text-muted);
    }

    #progress-bar-wrap {
      width: 220px;
      height: 2px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    #progress-bar {
      height: 100%;
      width: 0%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.2s;
    }

    /* ── splash screen ─────────────────────────────────────────── */
    #splash {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 60%, #0d2010 0%, #060d06 60%, #020502 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      z-index: 1000;
      cursor: pointer;
      transition: opacity 0.8s ease;
      overflow: hidden;
      user-select: none;
    }
    #splash.hidden { opacity: 0; pointer-events: none; }

    .splash-glow {
      position: absolute;
      width: 420px; height: 420px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(34,120,34,0.18) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -52%);
      animation: glow-pulse 3s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes glow-pulse {
      0%, 100% { opacity: 0.6; transform: translate(-50%, -52%) scale(1);    }
      50%       { opacity: 1;   transform: translate(-50%, -52%) scale(1.12); }
    }

    .splash-turtle {
      position: relative;
      z-index: 2;
      margin-bottom: -8px;
      animation: turtle-bob 2.8s ease-in-out infinite;
      filter: drop-shadow(0 12px 32px rgba(0,100,0,0.5));
    }
    @keyframes turtle-bob {
      0%, 100% { transform: translateY(0px)   rotate(0deg);    }
      40%       { transform: translateY(-14px) rotate(-1.5deg); }
      70%       { transform: translateY(-6px)  rotate(1deg);    }
    }

    .splash-text {
      position: relative;
      z-index: 2;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-top: 24px;
    }
    .splash-title {
      font-size: clamp(28px, 5vw, 52px);
      font-family: var(--font-ui);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #c8f0c0;
      text-shadow: 0 0 40px rgba(80,200,80,0.5), 0 2px 4px rgba(0,0,0,0.8);
    }
    .splash-subtitle {
      font-size: clamp(11px, 1.6vw, 15px);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #5a8a5a;
    }

    .splash-cta {
      position: relative;
      z-index: 2;
      margin-top: 36px;
      font-size: 11px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #3a6e3a;
      animation: cta-blink 2s ease-in-out infinite;
    }
    @keyframes cta-blink {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 1;   }
    }

    .splash-grass {
      position: absolute;
      bottom: 0; left: 0;
      width: 100%; height: 90px;
      pointer-events: none;
      z-index: 3;
      overflow: hidden;
    }
    .blade {
      position: absolute;
      bottom: 0;
      width: 6px;
      border-radius: 3px 3px 0 0;
      transform-origin: bottom center;
      animation: sway 3s ease-in-out infinite;
    }
    @keyframes sway {
      0%, 100% { transform: rotate(0deg); }
      50%       { transform: rotate(6deg); }
    }

    .firefly {
      position: absolute;
      width: 4px; height: 4px;
      border-radius: 50%;
      background: #aaff88;
      box-shadow: 0 0 8px 3px rgba(150,255,100,0.6);
      animation: fly linear infinite;
      pointer-events: none;
    }
    @keyframes fly {
      0%   { transform: translate(0,0) scale(0.5); opacity: 0; }
      15%  { opacity: 1; }
      50%  { transform: translate(var(--dx), var(--dy)) scale(1); opacity: 0.9; }
      85%  { opacity: 1; }
      100% { transform: translate(calc(var(--dx)*2), calc(var(--dy)*0.3)) scale(0.5); opacity: 0; }
    }

    .splash-mist {
      position: absolute;
      bottom: 0; left: -20%;
      width: 140%; height: 140px;
      background: radial-gradient(ellipse at 50% 100%, rgba(10,30,10,0.85) 0%, transparent 70%);
      pointer-events: none;
      z-index: 1;
    }

    /* ── toast notification ────────────────────────────────────── */
    #toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 100;
    }

    .toast {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 12px;
      max-width: 300px;
      animation: slide-in 0.25s ease;
    }
    .toast.success { border-color: var(--success); }
    .toast.error   { border-color: var(--danger); }
    .toast.pending { border-color: var(--warn); }

    .toast-icon { font-size: 14px; line-height: 1.4; flex-shrink: 0; }
    .toast-body { display: flex; flex-direction: column; gap: 3px; }
    .toast-title { color: var(--text); font-size: 12px; }
    .toast-msg { color: var(--text-muted); font-size: 11px; word-break: break-all; }

    @keyframes slide-in {
      from { transform: translateX(20px); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }

    /* ── footer ─────────────────────────────────────────────────── */
    #footer {
      width: 100%;
      max-width: calc(var(--canvas-w) * 1px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0 10px;
    }

    #network-badge {
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 3px 8px;
    }
    #network-badge.on-chain { border-color: var(--accent-dim); color: var(--accent); }

    #tx-link {
      font-size: 10px;
      color: var(--text-muted);
      text-decoration: none;
      display: none;
    }
    #tx-link.visible { display: inline; color: var(--accent); }
    #tx-link:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <!-- ── splash screen ────────────────────────────────────────── -->
  <div id="splash" onclick="dismissSplash()">
    <div class="splash-glow"></div>
    <div class="splash-mist"></div>

    <div class="firefly" style="left:12%;top:30%;--dx:40px; --dy:-60px;animation-duration:6s; animation-delay:0s;"></div>
    <div class="firefly" style="left:25%;top:55%;--dx:-30px;--dy:-80px;animation-duration:8s; animation-delay:1s;"></div>
    <div class="firefly" style="left:70%;top:25%;--dx:-50px;--dy:40px; animation-duration:7s; animation-delay:2s;"></div>
    <div class="firefly" style="left:80%;top:60%;--dx:20px; --dy:-70px;animation-duration:9s; animation-delay:0.5s;"></div>
    <div class="firefly" style="left:50%;top:15%;--dx:-40px;--dy:50px; animation-duration:5s; animation-delay:3s;"></div>
    <div class="firefly" style="left:88%;top:40%;--dx:-60px;--dy:-30px;animation-duration:7.5s;animation-delay:1.5s;"></div>
    <div class="firefly" style="left:5%; top:70%;--dx:70px; --dy:-40px;animation-duration:6.5s;animation-delay:2.5s;"></div>

    <div class="splash-turtle">
      <svg viewBox="0 0 220 150" width="280" height="190" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="shellGrad" cx="40%" cy="30%">
            <stop offset="0%"   stop-color="#4caf50"/>
            <stop offset="100%" stop-color="#1b5e20"/>
          </radialGradient>
          <radialGradient id="bodyGrad" cx="45%" cy="35%">
            <stop offset="0%"   stop-color="#66bb6a"/>
            <stop offset="100%" stop-color="#2e7d32"/>
          </radialGradient>
        </defs>
        <ellipse cx="105" cy="140" rx="70" ry="8" fill="rgba(0,40,0,0.45)"/>
        <ellipse cx="52"  cy="118" rx="18" ry="9" fill="#2e7d32" transform="rotate(25  52  118)"/>
        <ellipse cx="158" cy="118" rx="18" ry="9" fill="#2e7d32" transform="rotate(-25 158 118)"/>
        <ellipse cx="62"  cy="95"  rx="17" ry="8" fill="#388e3c" transform="rotate(-20 62  95)"/>
        <ellipse cx="148" cy="95"  rx="17" ry="8" fill="#388e3c" transform="rotate(20  148 95)"/>
        <path d="M40 100 Q24 108 27 118" stroke="#388e3c" stroke-width="10" fill="none" stroke-linecap="round"/>
        <ellipse cx="105" cy="105" rx="62" ry="30" fill="url(#bodyGrad)"/>
        <ellipse cx="105" cy="94"  rx="56" ry="38" fill="url(#shellGrad)"/>
        <polygon points="105,58 130,76 126,104 105,110 84,104 80,76" fill="#2e7d32" stroke="#81c784" stroke-width="1.2" stroke-linejoin="round"/>
        <line x1="105" y1="58"  x2="130" y2="76"  stroke="#81c784" stroke-width="1"/>
        <line x1="105" y1="58"  x2="80"  y2="76"  stroke="#81c784" stroke-width="1"/>
        <line x1="130" y1="76"  x2="148" y2="82"  stroke="#81c784" stroke-width="1"/>
        <line x1="80"  y1="76"  x2="62"  y2="82"  stroke="#81c784" stroke-width="1"/>
        <line x1="126" y1="104" x2="138" y2="112" stroke="#81c784" stroke-width="1"/>
        <line x1="84"  y1="104" x2="72"  y2="112" stroke="#81c784" stroke-width="1"/>
        <ellipse cx="96" cy="76" rx="18" ry="11" fill="rgba(255,255,255,0.09)" transform="rotate(-10 96 76)"/>
        <ellipse cx="168" cy="100" rx="14" ry="11" fill="#388e3c"/>
        <circle cx="180" cy="91" r="18" fill="url(#bodyGrad)"/>
        <ellipse cx="175" cy="85" rx="7" ry="5" fill="rgba(255,255,255,0.1)" transform="rotate(-20 175 85)"/>
        <circle cx="187" cy="86" r="6"   fill="#1a1a1a"/>
        <circle cx="187" cy="86" r="3.5" fill="#111"/>
        <circle cx="189" cy="84" r="1.5" fill="white"/>
        <circle cx="193" cy="92" r="1.8" fill="#1b5e20"/>
        <path d="M177 97 Q182 103 188 97" stroke="#1b5e20" stroke-width="2.2" fill="none" stroke-linecap="round"/>
      </svg>
    </div>

    <div class="splash-text">
      <div class="splash-title">Turtle the Saver</div>
      <div class="splash-subtitle"><!-- tagline / description --></div>
    </div>

    <div class="splash-cta">click anywhere to begin</div>
    <div class="splash-grass" id="splashGrass"></div>
  </div>

  <!-- ── header ─────────────────────────────────────────────── -->
  <div id="header">
    <span id="game-title">$GODOT_PROJECT_NAME</span>
    <button id="wallet-btn" onclick="Web3Bridge.connectWallet()">
      <span class="dot"></span>
      <span id="wallet-label">connect wallet</span>
    </button>
  </div>

  <!-- ── game canvas ────────────────────────────────────────── -->
  <div id="canvas-wrap">
    <canvas id="canvas" tabindex="0"></canvas>

    <div id="loading-overlay">
      <span id="loading-label">loading...</span>
      <div id="progress-bar-wrap">
        <div id="progress-bar"></div>
      </div>
    </div>
  </div>

  <!-- ── footer ─────────────────────────────────────────────── -->
  <div id="footer">
    <span id="network-badge">not connected</span>
    <a id="tx-link" target="_blank" rel="noopener">view last tx ↗</a>
  </div>

  <!-- ── toasts ─────────────────────────────────────────────── -->
  <div id="toast-container"></div>

  <script>
    (function() {
      const container = document.getElementById("splashGrass");
      const colors = ["#1a4d1a","#2e7d32","#388e3c","#1b5e20","#43a047"];
      for (let i = 0; i < 80; i++) {
        const b = document.createElement("div");
        b.className = "blade";
        const h = 30 + Math.random() * 55;
        b.style.cssText = `
          left:${(i/80)*100+(Math.random()-0.5)*1.5}%;
          height:${h}px;
          background:${colors[Math.floor(Math.random()*colors.length)]};
          animation-delay:${Math.random()*3}s;
          animation-duration:${2.5+Math.random()*2}s;
          transform:rotate(${(Math.random()-0.5)*14}deg);
          opacity:${0.6+Math.random()*0.4};
        `;
        container.appendChild(b);
      }
    })();

    function dismissSplash() {
      const splash = document.getElementById("splash");
      splash.classList.add("hidden");
      setTimeout(() => splash.remove(), 800);
    }
  </script>


  <!-- ═══════════════════════════════════════════════════════════
       WEB3 BRIDGE
       All functions here are callable from Godot via:
       JavaScriptBridge.eval("Web3Bridge.functionName(args)")
  ════════════════════════════════════════════════════════════ -->
  <script>
  const Web3Bridge = (() => {

    // ── CONFIG — replace these for your hackathon ──────────────
    const DCAI_RPC_URL    = "https://rpc.your-dcai-l3.example";   // L3 RPC endpoint
    const DCAI_CHAIN_ID   = 12345;                                  // L3 chain ID
    const DCAI_CHAIN_NAME = "DCAI L3";
    const EXPLORER_URL    = "https://explorer.your-dcai-l3.example";
    const CONTRACT_ADDRESS = "0xYourContractAddressHere";

    // ── ABI — add your contract functions here ─────────────────
    // Minimal example: submitScore + mintBadge
    const CONTRACT_ABI = [
      "function submitScore(uint256 score) external",
      "function mintBadge(address to, uint256 badgeId) external",
      "function getScore(address player) external view returns (uint256)",
      "event ScoreSubmitted(address indexed player, uint256 score)",
      "event BadgeMinted(address indexed player, uint256 badgeId)"
    ];

    // ── internal state ─────────────────────────────────────────
    let provider = null;
    let signer   = null;
    let contract = null;
    let walletAddress = null;

    // ── toast helper ───────────────────────────────────────────
    function toast(type, title, msg, duration = 5000) {
      const icons = { success: "✓", error: "✕", pending: "…" };
      const el = document.createElement("div");
      el.className = `toast ${type}`;
      el.innerHTML = `
        <span class="toast-icon">${icons[type] || "·"}</span>
        <div class="toast-body">
          <span class="toast-title">${title}</span>
          ${msg ? `<span class="toast-msg">${msg}</span>` : ""}
        </div>`;
      document.getElementById("toast-container").appendChild(el);
      setTimeout(() => el.remove(), duration);
    }

    // ── wallet connection ──────────────────────────────────────
    async function connectWallet() {
      if (!window.ethereum) {
        toast("error", "no wallet found", "install MetaMask or a compatible wallet");
        return null;
      }
      try {
        provider = new ethers.BrowserProvider(window.ethereum);
        signer   = await provider.getSigner();
        walletAddress = await signer.getAddress();

        // switch/add the DCAI L3 network
        await switchToChain();

        // wire up contract
        contract = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, signer);

        // update UI
        const short = walletAddress.slice(0, 6) + "..." + walletAddress.slice(-4);
        document.getElementById("wallet-label").textContent = short;
        document.getElementById("wallet-btn").classList.add("connected");
        document.querySelector("#wallet-btn .dot").style.background = "var(--success)";
        document.getElementById("network-badge").textContent = DCAI_CHAIN_NAME;
        document.getElementById("network-badge").classList.add("on-chain");

        toast("success", "wallet connected", short);

        // notify Godot
        _toGodot("walletConnected", walletAddress);

        return walletAddress;
      } catch (err) {
        toast("error", "connection failed", err.message);
        return null;
      }
    }

    async function switchToChain() {
      try {
        await window.ethereum.request({
          method: "wallet_switchEthereumChain",
          params: [{ chainId: "0x" + DCAI_CHAIN_ID.toString(16) }]
        });
      } catch (err) {
        // chain not added yet — add it
        if (err.code === 4902) {
          await window.ethereum.request({
            method: "wallet_addEthereumChain",
            params: [{
              chainId:          "0x" + DCAI_CHAIN_ID.toString(16),
              chainName:        DCAI_CHAIN_NAME,
              rpcUrls:          [DCAI_RPC_URL],
              nativeCurrency:   { name: "ETH", symbol: "ETH", decimals: 18 },
              blockExplorerUrls: [EXPLORER_URL]
            }]
          });
        } else {
          throw err;
        }
      }
    }

    // ── submit score to chain ──────────────────────────────────
    // Called from Godot: JavaScriptBridge.eval("Web3Bridge.submitScore(100)")
    async function submitScore(score) {
      if (!contract) {
        toast("error", "wallet not connected", "connect wallet first");
        return;
      }
      toast("pending", "submitting score", "waiting for wallet approval...", 15000);
      try {
        const tx = await contract.submitScore(score);
        toast("pending", "tx sent", "confirming on " + DCAI_CHAIN_NAME + "...", 15000);
        const receipt = await tx.wait();

        _showTxLink(receipt.hash);
        toast("success", "score recorded!", "score: " + score + " on-chain");
        _toGodot("scoreSubmitted", receipt.hash);
      } catch (err) {
        toast("error", "tx failed", err.reason || err.message);
        _toGodot("txFailed", err.message);
      }
    }

    // ── mint badge ─────────────────────────────────────────────
    // Called from Godot: JavaScriptBridge.eval("Web3Bridge.mintBadge(1)")
    async function mintBadge(badgeId) {
      if (!contract) {
        toast("error", "wallet not connected", "connect wallet first");
        return;
      }
      toast("pending", "minting badge", "waiting for approval...", 15000);
      try {
        const tx = await contract.mintBadge(walletAddress, badgeId);
        const receipt = await tx.wait();

        _showTxLink(receipt.hash);
        toast("success", "badge minted!", "badge #" + badgeId + " is yours");
        _toGodot("badgeMinted", receipt.hash);
      } catch (err) {
        toast("error", "mint failed", err.reason || err.message);
        _toGodot("txFailed", err.message);
      }
    }

    // ── read score (no tx needed) ──────────────────────────────
    // Called from Godot: JavaScriptBridge.eval("Web3Bridge.getScore()")
    async function getScore() {
      if (!contract || !walletAddress) return;
      try {
        const score = await contract.getScore(walletAddress);
        _toGodot("scoreLoaded", score.toString());
        return score.toString();
      } catch (err) {
        console.error("getScore:", err);
      }
    }

    // ── helpers ────────────────────────────────────────────────
    function _showTxLink(hash) {
      const link = document.getElementById("tx-link");
      link.href = `${EXPLORER_URL}/tx/${hash}`;
      link.classList.add("visible");
    }

    // Send data back into Godot via a global JS property
    // In Godot, poll with: JavaScriptBridge.get_interface("window").godotIncoming
    function _toGodot(event, data) {
      window.godotIncoming = JSON.stringify({ event, data });
    }

    // expose public API
    return { connectWallet, submitScore, mintBadge, getScore };
  })();

  // Make bridge globally accessible so Godot's eval calls work
  window.Web3Bridge = Web3Bridge;
  </script>


  <!-- ═══════════════════════════════════════════════════════════
       GODOT ENGINE LOADER
       This is the standard Godot 4 Web export loader.
       $GODOT_* variables are substituted by the Godot exporter.
  ════════════════════════════════════════════════════════════ -->
  <script src="$GODOT_URL"></script>
  <script>
    const GODOT_CONFIG = {
      args:       [],
      canvasResizePolicy: $GODOT_CANVAS_RESIZE_POLICY,
      executable: "$GODOT_URL",
    };

    const engine = new Engine(GODOT_CONFIG);

    engine.startGame({
      canvas:     document.getElementById("canvas"),
      onProgress: (current, total) => {
        if (total > 0) {
          const pct = Math.round((current / total) * 100);
          document.getElementById("progress-bar").style.width = pct + "%";
          document.getElementById("loading-label").textContent = "loading... " + pct + "%";
        }
      }
    }).then(() => {
      const overlay = document.getElementById("loading-overlay");
      overlay.classList.add("hidden");
      setTimeout(() => overlay.remove(), 500);
    }).catch((err) => {
      document.getElementById("loading-label").textContent = "failed to load: " + err.message;
      console.error(err);
    });
  </script>

</body>
</html>
