<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Turtles Must Eat</title>
  <meta name="theme-color" content="#0a0a0f" />
  <link id="-gd-engine-icon" rel="icon" type="image/png" href="index.icon.png" />
  <link rel="apple-touch-icon" href="index.apple-touch-icon.png"/>

  <!-- ethers.js v6 — wallet + JSON-RPC -->
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.1/dist/ethers.umd.min.js"></script>

  <style>
    /* ── design tokens ─────────────────────────────────────────── */
    :root {
      --bg:          #0a0a0f;
      --surface:     #13131c;
      --border:      #2a2a3d;
      --accent:      #7c6dfa;
      --accent-dim:  #3d3580;
      --success:     #22d48f;
      --warn:        #f0a030;
      --danger:      #e84040;
      --text:        #e8e8f0;
      --text-muted:  #6b6b88;
      --font-ui:     'DM Mono', 'Fira Mono', monospace;
    }

    /* ── reset ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── header bar ────────────────────────────────────────────── */
    #header {
      width: 100%;
      max-width: 1200px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px 8px;
    }

    #game-title {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* ── wallet button ─────────────────────────────────────────── */
    #wallet-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 14px;
      font-family: var(--font-ui);
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    #wallet-btn:hover { border-color: var(--accent); color: var(--text); }
    #wallet-btn.connected { border-color: var(--success); color: var(--success); }
    #wallet-btn.connected .dot { background: var(--success); }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      flex-shrink: 0;
    }

    /* ── canvas wrapper ────────────────────────────────────────── */
    #canvas-wrap {
      position: relative;
      flex: 1;
      min-height: 0;
      aspect-ratio: 16 / 9;
      max-width: 100%;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      background: #000;
    }

    #canvas {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
    }

    /* ── godot status overlay ──────────────────────────────────── */
    #status {
      position: absolute;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 10;
    }

    #status-splash {
      max-height: 60%;
      max-width: 60%;
      margin: auto;
      object-fit: contain;
    }
    #status-splash.show-image--false { display: none; }

    #status-progress {
      width: 220px;
      height: 4px;
      accent-color: var(--accent);
    }
    #status-notice {
      display: none;
      background-color: #5b3943;
      border-radius: 0.5rem;
      border: 1px solid #9b3943;
      color: #e0e0e0;
      font-family: var(--font-ui);
      font-size: 11px;
      padding: 1rem;
      text-align: center;
      max-width: 300px;
    }

    /* ── footer ─────────────────────────────────────────────────── */
    #footer {
      width: 100%;
      max-width: 1200px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px 10px;
    }

    #network-badge {
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 3px 8px;
    }
    #network-badge.on-chain { border-color: var(--accent-dim); color: var(--accent); }

    #tx-link {
      font-size: 10px;
      color: var(--text-muted);
      text-decoration: none;
      display: none;
    }
    #tx-link.visible { display: inline; color: var(--accent); }
    #tx-link:hover { text-decoration: underline; }

    /* ── toast notification ────────────────────────────────────── */
    #toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 100;
    }
    .toast {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 12px;
      max-width: 300px;
      animation: slide-in 0.25s ease;
    }
    .toast.success { border-color: var(--success); }
    .toast.error   { border-color: var(--danger); }
    .toast.pending { border-color: var(--warn); }
    .toast-icon { font-size: 14px; line-height: 1.4; flex-shrink: 0; }
    .toast-body { display: flex; flex-direction: column; gap: 3px; }
    .toast-title { color: var(--text); font-size: 12px; }
    .toast-msg { color: var(--text-muted); font-size: 11px; word-break: break-all; }

    @keyframes slide-in {
      from { transform: translateX(20px); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }

  </style>
</head>
<body>


  <!-- ── header ─────────────────────────────────────────────── -->
  <div id="header">
    <span id="game-title">Turtles Must Eat</span>
    <button id="wallet-btn" onclick="Web3Bridge.connectWallet()">
      <span class="dot"></span>
      <span id="wallet-label">connect wallet</span>
    </button>
  </div>

  <!-- ── game canvas ────────────────────────────────────────── -->
  <div id="canvas-wrap">
    <canvas id="canvas" tabindex="0">
      Your browser does not support the canvas tag.
    </canvas>
    <div id="status">
      <img id="status-splash" class="show-image--true" src="index.png" alt="">
      <progress id="status-progress"></progress>
      <div id="status-notice"></div>
    </div>
  </div>

  <!-- ── footer ─────────────────────────────────────────────── -->
  <div id="footer">
    <span id="network-badge">not connected</span>
    <a id="tx-link" target="_blank" rel="noopener">view last tx ↗</a>
  </div>

  <!-- ── toasts ─────────────────────────────────────────────── -->
  <div id="toast-container"></div>


  <!-- ── web3 bridge ────────────────────────────────────────── -->
  <script src="web3bridge.js"></script>

  <!-- ── godot engine ───────────────────────────────────────── -->
  <script src="index.js"></script>
  <script>
    const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"emscriptenPoolSize":8,"ensureCrossOriginIsolationHeaders":true,"executable":"index","experimentalVK":false,"fileSizes":{"index.pck":8335864,"index.wasm":37695054},"focusCanvas":true,"gdextensionLibs":[],"godotPoolSize":4};
    const GODOT_THREADS_ENABLED = false;
    const engine = new Engine(GODOT_CONFIG);

    (function () {
      const statusOverlay = document.getElementById('status');
      const statusProgress = document.getElementById('status-progress');
      const statusNotice = document.getElementById('status-notice');
      let initializing = true;
      let statusMode = '';

      function setStatusMode(mode) {
        if (statusMode === mode || !initializing) return;
        if (mode === 'hidden') {
          statusOverlay.remove();
          initializing = false;
          return;
        }
        statusOverlay.style.visibility = 'visible';
        statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
        statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
        statusMode = mode;
      }

      function setStatusNotice(text) {
        while (statusNotice.lastChild) statusNotice.removeChild(statusNotice.lastChild);
        text.split('\n').forEach((line) => {
          statusNotice.appendChild(document.createTextNode(line));
          statusNotice.appendChild(document.createElement('br'));
        });
      }

      function displayFailureNotice(err) {
        console.error(err);
        if (err instanceof Error) setStatusNotice(err.message);
        else if (typeof err === 'string') setStatusNotice(err);
        else setStatusNotice('An unknown error occurred.');
        setStatusMode('notice');
        initializing = false;
      }

      const missing = Engine.getMissingFeatures({ threads: GODOT_THREADS_ENABLED });
      if (missing.length !== 0) {
        displayFailureNotice('Missing features:\n' + missing.join('\n'));
      } else {
        setStatusMode('progress');
        engine.startGame({
          canvas: document.getElementById('canvas'),
          onProgress: function (current, total) {
            if (current > 0 && total > 0) {
              statusProgress.value = current;
              statusProgress.max = total;
            } else {
              statusProgress.removeAttribute('value');
              statusProgress.removeAttribute('max');
            }
          },
        }).then(() => {
          setStatusMode('hidden');
        }, displayFailureNotice);
      }
    }());
  </script>

</body>
</html>
