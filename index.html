<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>$GODOT_PROJECT_NAME</title>

  <!-- Godot requires this exact meta for audio context -->
  <meta name="theme-color" content="#0a0a0f" />

  <!-- Styles -->
  <link rel="stylesheet" href="style.css" />

  <!-- ethers.js v6 — wallet + JSON-RPC -->
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.1/dist/ethers.umd.min.js"></script>
</head>
<body>

  <!-- ── header ─────────────────────────────────────────────── -->
  <div id="header">
    <span id="game-title">$GODOT_PROJECT_NAME</span>
    <button id="wallet-btn" onclick="Web3Bridge.connectWallet()">
      <span class="dot"></span>
      <span id="wallet-label">connect wallet</span>
    </button>
  </div>

  <!-- ── game canvas ────────────────────────────────────────── -->
  <div id="canvas-wrap">
    <canvas id="canvas" tabindex="0"></canvas>

    <div id="loading-overlay">
      <span id="loading-label">loading...</span>
      <div id="progress-bar-wrap">
        <div id="progress-bar"></div>
      </div>
    </div>
  </div>

  <!-- ── footer ─────────────────────────────────────────────── -->
  <div id="footer">
    <span id="network-badge">not connected</span>
    <a id="tx-link" target="_blank" rel="noopener">view last tx ↗</a>
  </div>

  <!-- ── toasts ─────────────────────────────────────────────── -->
  <div id="toast-container"></div>

  <!-- Splash screen logic -->
  <script src="splash.js"></script>

  <!-- Web3 / wallet bridge -->
  <script src="web3bridge.js"></script>

  <!-- ═══════════════════════════════════════════════════════════
       GODOT ENGINE LOADER
       $GODOT_* variables below are substituted by Godot's exporter.
       Do NOT move this to an external file — Godot only processes
       template variables inside the HTML file itself.
  ════════════════════════════════════════════════════════════ -->
  <script src="$GODOT_URL"></script>
  <script>
    const GODOT_CONFIG = {
      args:               [],
      canvasResizePolicy: $GODOT_CANVAS_RESIZE_POLICY,
      executable:         "$GODOT_URL",
    };

    const engine = new Engine(GODOT_CONFIG);

    engine.startGame({
      canvas:     document.getElementById("canvas"),
      onProgress: (current, total) => {
        if (total > 0) {
          const pct = Math.round((current / total) * 100);
          document.getElementById("progress-bar").style.width = pct + "%";
          document.getElementById("loading-label").textContent = "loading... " + pct + "%";
        }
      }
    }).then(() => {
      const overlay = document.getElementById("loading-overlay");
      overlay.classList.add("hidden");
      setTimeout(() => overlay.remove(), 500);
    }).catch((err) => {
      document.getElementById("loading-label").textContent = "failed to load: " + err.message;
      console.error(err);
    });
  </script>

</body>
</html>
